<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Canceled | NECKTIE</title>
  <meta name="description" content="Your NECKTIE checkout was canceled.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: "#050608",
            navydeep: "#0f1b2f",
            goldmuted: "#b89a62",
            goldsoft: "#d6bf91",
            stonewarm: "#9b927f"
          },
          fontFamily: {
            display: ["Georgia", "Times New Roman", "serif"],
            sans: ["ui-sans-serif", "system-ui", "sans-serif"]
          },
          letterSpacing: {
            editorial: "0.28em"
          }
        }
      }
    };
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .section-frame {
        @apply border border-white/10 bg-white/5 backdrop-blur-sm;
      }
      .kicker {
        @apply text-[0.68rem] font-semibold uppercase tracking-editorial text-goldmuted;
      }
    }
  </style>
</head>
<body class="bg-obsidian text-white antialiased">
  <header class="border-b border-white/10 bg-black/45 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5 md:px-10">
      <a href="index.html" class="brand-lockup">
        <img src="necktie cropped.png" alt="NECKTIE logo" class="brand-mark-image">
        <span class="brand-copy">
          <span class="font-display text-2xl tracking-[0.24em] text-white">NECKTIE</span>
          <span class="mt-1 text-[0.7rem] uppercase tracking-[0.3em] text-stonewarm">Premium Tailoring</span>
        </span>
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-6 py-16 md:px-10 md:py-24">
    <section class="section-frame rounded-[2rem] p-10 text-center">
      <p class="kicker justify-center">Checkout Canceled</p>
      <h1 class="mt-5 font-display text-5xl text-white md:text-6xl">Your purchase wasn’t completed.</h1>
      <p class="mt-8 text-lg leading-8 text-stonewarm">
        No problem. You can return to the collection, review your suit option, and start checkout again whenever you're ready.
      </p>
      <div class="mt-10 flex justify-center">
        <a href="index.html#foundation" class="inline-flex min-h-14 items-center justify-center rounded-full bg-goldmuted px-8 text-sm font-semibold uppercase tracking-[0.22em] text-black transition hover:bg-goldsoft">
          Return to Collection
        </a>
      </div>
    </section>
  </main>
</body>
</html>
